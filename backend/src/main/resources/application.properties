# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/levelup}
spring.datasource.username=${DB_USERNAME:levelup}
spring.datasource.password=${DB_PASSWORD:levelup}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.jwt.secret=${JWT_SECRET:change-this-development-jwt-secret-at-least-32-chars}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=${GEMINI_MODEL:gemini-1.5-flash}
app.metrics.review-threshold-hours=${REVIEW_THRESHOLD_HOURS:48}

# Server Configuration
server.port=${PORT:8082}
