spring.datasource.url=jdbc:h2:mem:levelup_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.jwt.secret=test-jwt-secret-that-is-long-enough-for-hmac
app.jwt.expiration-seconds=3600
app.cors.allowed-origins=http://localhost:5173
app.gemini.api-key=
app.gemini.model=gemini-1.5-flash
app.metrics.review-threshold-hours=48
