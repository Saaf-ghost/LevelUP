services:
  postgres:
    image: postgres:16-alpine
    container_name: levelup-postgres
    environment:
      POSTGRES_DB: levelup
      POSTGRES_USER: ${DB_USERNAME:-levelup}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-levelup}
    ports:
      - "55432:5432"
    volumes:
      - levelup-postgres-data:/var/lib/postgresql/data

volumes:
  levelup-postgres-data:
